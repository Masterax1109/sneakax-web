<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakaX - Detalle del Producto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización sutil para las animaciones y scrollbar */
        html { scroll-behavior: smooth; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-200 font-sans min-h-screen flex flex-col">

    <!-- NAVBAR (Mismo de index.html pero con estado para volver) -->
    <nav class="bg-gray-200 flex justify-between items-center px-8 py-4 sticky top-0 z-50 shadow-sm border-b border-gray-300">
        <!-- Logo -->
        <a href="/store" class="font-extrabold text-2xl tracking-tighter hover:scale-105 transition-transform cursor-pointer">
            SNEAK<span class="text-[#FF5722]">AX</span>
        </a>

        <!-- Barra de Búsqueda -->
        <div class="flex-grow max-w-4xl mx-8">
            <input 
                type="text" 
                placeholder="BUSCAR POR MARCA Y MODELO" 
                class="w-full border border-black rounded-md p-2 bg-transparent text-sm font-bold focus:outline-[#FF5722] placeholder-gray-600 uppercase transition-all focus:bg-white"
            >
        </div>

        <!-- Íconos de Navegación -->
        <div class="flex items-center gap-6 text-black relative">
            <button id="cart-icon" class="hover:text-[#FF5722] transition transform hover:scale-110 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>
            <button id="hamburger-menu" class="hover:text-[#FF5722] transition focus:outline-none transform hover:scale-110">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <!-- Menú desplegable -->
            <div id="dropdown-menu" class="hidden absolute top-10 right-0 mt-2 bg-white border border-gray-200 shadow-xl rounded-lg w-48 overflow-hidden z-50 transform origin-top-right transition-all">
                <div id="admin-panel-link"></div>
                <button id="logout-btn" class="w-full text-left px-4 py-3 text-sm font-bold text-red-600 hover:bg-red-50 hover:text-red-700 transition">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- PANTALLA DE CARGA / ERROR -->
    <div id="loader" class="flex-1 flex justify-center items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#FF5722]"></div>
    </div>
    <div id="error-message" class="hidden flex-1 flex flex-col justify-center items-center text-red-500 font-bold text-xl">
        <p>No se pudo encontrar el zapato indicado.</p>
        <a href="/store" class="mt-4 bg-black text-white px-6 py-2 rounded-full hover:bg-gray-800 transition">Volver a la tienda</a>
    </div>

    <!-- CONTENEDOR PRINCIPAL DEL ZAPATO -->
    <main id="product-container" class="hidden flex-1 flex flex-col w-full">
        <!-- SECCIÓN SUPERIOR: Fondo blanco -->
        <section class="bg-white w-full py-12 px-8 flex justify-center relative shadow-sm z-10 min-h-[45vh]">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-between gap-12">
                
                <!-- Botón Volver (Flotante) -->
                <a href="/store" class="absolute top-6 left-8 flex items-center gap-2 text-gray-500 hover:text-black font-bold uppercase text-xs tracking-wider transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Regresar
                </a>

                <!-- Imagen del Zapato (Izquierda) -->
                <div class="w-full md:w-1/2 flex items-center justify-center p-8 lg:p-12">
                    <img id="shoe-image" src="" alt="Zapato" class="max-h-[300px] w-auto object-contain drop-shadow-2xl transition hover:scale-[1.03] duration-500">
                </div>

                <!-- Títulos (Derecha) -->
                <div class="w-full md:w-1/2 flex flex-col justify-center items-start text-left ml-0 md:ml-8 gap-2">
                    <h2 id="shoe-brand" class="text-3xl font-black uppercase tracking-widest text-[#FF5722] drop-shadow-sm mb-1"></h2>
                    <h1 id="shoe-name" class="text-5xl font-extrabold uppercase text-black leading-tight drop-shadow-sm"></h1>
                    <p id="shoe-colorway-subtitle" class="text-gray-400 font-bold uppercase tracking-widest text-lg mt-2"></p>
                </div>
            </div>
        </section>

        <!-- SECCIÓN INFERIOR: Fondo Gris -->
        <section class="bg-[#E5E7EB] w-full py-16 px-8 flex justify-center flex-1">
            <div class="max-w-6xl w-full flex flex-col md:flex-row justify-center gap-12 items-start">
                
                <!-- Tarjeta: Detalles del producto -->
                <div class="glass-card w-full md:w-[45%] lg:w-[40%] rounded-[2rem] shadow-xl p-10 transform hover:-translate-y-1 transition duration-300">
                    <h3 class="text-2xl font-black mb-8 text-black border-b-2 border-gray-100 pb-4">Detalles del producto</h3>
                    
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-500 font-semibold tracking-wide text-lg">Colorway</span>
                        <span id="shoe-colorway-ui" class="text-black font-extrabold text-lg"></span>
                    </div>
                    
                    <div class="flex justify-between items-center mt-6 pt-6 border-t border-gray-100">
                        <span class="text-gray-500 font-semibold tracking-wide text-lg">Retail Price</span>
                        <span id="shoe-price" class="text-[#FF5722] font-black text-2xl"></span>
                    </div>
                </div>

                <!-- Tarjeta: Tallas y Comprar -->
                <div class="glass-card w-full md:w-[45%] lg:w-[40%] rounded-[2rem] shadow-xl p-10 flex flex-col justify-between items-center transform hover:-translate-y-1 transition duration-300">
                    <div class="w-full">
                        <h3 class="text-2xl font-black mb-8 text-black border-b-2 border-gray-100 pb-4">Tallas Disponibles</h3>
                        
                        <!-- Lista de Botones de Tallas -->
                        <div id="shoe-sizes" class="flex flex-wrap gap-4 justify-center md:justify-start">
                            <!-- Los botones se inyectarán con JS -->
                        </div>
                    </div>

                    <!-- Botón de Compra -->
                    <button id="buy-btn" class="mt-12 w-full md:w-4/5 bg-[#FF5722] text-black font-black text-lg py-4 px-8 rounded-full shadow-[0_4px_14px_0_rgba(255,87,34,0.39)] hover:shadow-[0_6px_20px_rgba(255,87,34,0.5)] hover:-translate-y-0.5 hover:bg-orange-500 transition-all duration-300 border-2 border-transparent">
                        BUY NOW
                    </button>

                    <!-- Mensaje Carrito (Oculto por defecto) -->
                    <div id="cart-message" class="hidden mt-4 text-center font-bold text-sm w-full transition-opacity duration-500 opacity-0"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Overlay Fondo Oscuro Carrito -->
    <div id="cart-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity opacity-0"></div>

    <!-- SIDEBAR CARRITO -->
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <!-- Cabecera -->
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-extrabold uppercase">TÚ CARRITO</h2>
            <button id="close-cart-btn" class="text-gray-400 hover:text-black transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Lista de Productos -->
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Los items inyectados via JS irán aquí -->
        </div>

        <!-- Footer Cierre -->
        <div class="border-t border-gray-200 p-6 bg-gray-50">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-500 font-bold uppercase tracking-widest text-sm">TOTAL</span>
                <span id="cart-total" class="text-2xl font-black text-[#FF5722]">$0</span>
            </div>
            <a href="/checkout" class="block text-center w-full bg-[#FF5722] text-black font-black text-lg py-4 rounded-full shadow-[0_4px_14px_0_rgba(255,87,34,0.39)] hover:shadow-[0_6px_20px_rgba(255,87,34,0.5)] hover:-translate-y-0.5 hover:bg-orange-500 transition-all duration-300 border-2 border-transparent">
                IR A PAGAR
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
