<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakaX - Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#E5E7EB] font-sans">

    <!-- NAVBAR -->
    <nav class="flex justify-between items-center px-8 py-4 bg-white sticky top-0 z-50 shadow-sm">
        <!-- Logo -->
        <div class="font-extrabold text-2xl tracking-tighter">
            SNEAK<span class="text-[#FF5722]">AX</span>
        </div>

        <!-- Barra de Búsqueda -->
        <div class="flex-grow max-w-4xl mx-8">
            <input 
                type="text" 
                placeholder="BUSCAR POR MARCA Y MODELO" 
                class="w-full border border-black rounded-md p-2 bg-transparent text-sm font-bold focus:outline-[#FF5722] placeholder-gray-600 uppercase"
            >
        </div>

        <!-- 1. Menú Visitante (Botón Login) -->
        <div id="guest-menu" class="flex">
            <!-- Cambiamos /login por /home -->
            <a href="/home" class="bg-[#FF5722] text-black font-bold py-2 px-8 rounded-full hover:bg-orange-600 transition border-2 border-transparent hover:border-black text-sm">
            LOGIN
            </a>
        </div>

        <!-- 2. Menú Logueado (Íconos) -->
        <div id="logged-menu" class="hidden flex items-center gap-6 text-black relative">
            <!-- Ícono Usuario -->
            <button class="hover:text-[#FF5722] transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
            </button>
            <!-- Ícono Carrito -->
            <button id="cart-icon" class="hover:text-[#FF5722] transition focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>
            <!-- Ícono Menú Hamburguesa -->
            <button id="hamburger-menu" class="hover:text-[#FF5722] transition focus:outline-none">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <!-- NUEVO: MENÚ DESPLEGABLE -->
            <div id="dropdown-menu" class="hidden absolute top-10 right-0 mt-2 bg-white border border-gray-200 shadow-xl rounded-lg w-48 overflow-hidden z-50">
                
                <!-- Aquí inyectaremos opciones como 'Mi Perfil' o 'Panel Admin' luego -->
                <div id="admin-panel-link"></div>

                <!-- El Botón de Cerrar Sesión movido al menú -->
                <button id="logout-btn" class="w-full text-left px-4 py-3 text-sm font-bold text-red-600 hover:bg-gray-100 transition">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- SECCIÓN HERO (NEW DROP) -->
    <section class="relative bg-cover bg-center bg-no-repeat py-20 shadow-sm border-b border-gray-200" style="background-image: url('/images/StoreBg.png');">
        <!-- Overlay claro para que el zapato y el texto resalten y al mismo tiempo se vea el graffiti -->
        <div class="absolute inset-0 bg-white/60 backdrop-blur-sm"></div>
        
        <div class="relative z-10 flex flex-col items-center justify-center">
            <h1 class="text-xl font-bold mb-4 uppercase text-black">New Drop</h1>
            
            <!-- Espacio para el zapato -->
            <div class="w-48 h-48 flex items-center justify-center mb-6">
                <!-- Por defecto no tiene imagen válida pero le podemos añadir la clase -->
                <img src="/ruta-a-tu-imagen/jordan.png" alt="Zapatos Jordan" class="object-contain w-full h-full drop-shadow-xl">
            </div>

            <button class="bg-[#FF5722] text-black font-bold py-2 px-14 rounded-full shadow-md hover:bg-orange-600 transition border-2 border-transparent hover:border-black text-sm">
                BUY
            </button>
        </div>
    </section>

    <!-- SECCIÓN DE PRODUCTOS -->
    <section class="py-16 min-h-[60vh]">
        <!-- Este es el contenedor vacío. Aquí inyectaremos las tarjetas  -->
        <div id="shoes-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8">

        </div>
    </section>

    <!-- Overlay Fondo Oscuro Carrito -->
    <div id="cart-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity opacity-0"></div>

    <!-- SIDEBAR CARRITO -->
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <!-- Cabecera -->
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-extrabold uppercase">TÚ CARRITO</h2>
            <button id="close-cart-btn" class="text-gray-400 hover:text-black transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Lista de Productos -->
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Los items inyectados via JS irán aquí -->
        </div>

        <!-- Footer Cierre -->
        <div class="border-t border-gray-200 p-6 bg-gray-50">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-500 font-bold uppercase tracking-widest text-sm">TOTAL</span>
                <span id="cart-total" class="text-2xl font-black text-[#FF5722]">$0</span>
            </div>
            <a href="/checkout" class="block text-center w-full bg-[#FF5722] text-black font-black text-lg py-4 rounded-full shadow-[0_4px_14px_0_rgba(255,87,34,0.39)] hover:shadow-[0_6px_20px_rgba(255,87,34,0.5)] hover:-translate-y-0.5 hover:bg-orange-500 transition-all duration-300 border-2 border-transparent">
                IR A PAGAR
            </a>
        </div>
    </div>

    <!-- Scripts de Axios y tu JS local -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
