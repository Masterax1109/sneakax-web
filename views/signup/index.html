<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        safelist: ['outline-green-500', 'outline-red-500', 'outline-2', 'outline']
      }
    </script>
    
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <title>SneakaX - Registro</title>
  </head>
  <body class="bg-gray-100 overflow-x-hidden">
    
    <nav
      id="navbar"
      class="fixed top-0 left-0 right-0 bg-white h-16 flex items-center px-8 shadow-sm z-20"
    >
      <span class="font-extrabold text-2xl tracking-tighter">SNEAK<span class="text-[#FF5722]">AX</span></span>
    </nav>
    
    <div id="notification" class="fixed top-20 right-0 left-0 z-50"></div>

    <div class="flex pt-16 min-h-screen w-full mx-auto">
      
      <!-- Izquierda: Imagen de la Suela -->
      <div class="hidden lg:flex w-1/2 bg-[#8C8F91] relative overflow-hidden items-center justify-center">
        <img src="/images/sole.png" alt="Suela de Zapato" class="absolute h-[120%] w-[120%] object-contain -rotate-90 scale-125 opacity-90 drop-shadow-2xl">
      </div>

      <!-- Derecha: Formulario -->
      <div class="flex w-full lg:w-1/2 justify-center items-center bg-[#E5E7EB] px-4 py-8 overflow-y-auto">
        
        <form
          id="form"
          class="flex flex-col gap-3 bg-white p-8 sm:p-10 rounded-2xl shadow-xl w-full sm:w-8/12 lg:w-9/12 max-w-md my-auto"
        >
          <h2 class="font-black text-2xl text-center mb-2 uppercase text-gray-800">Crea tu cuenta</h2>

          <div class="flex flex-col gap-1">
            <div class="flex items-start gap-3">
              <!-- Icono Usuario -->
              <svg class="w-6 h-6 text-black mt-2" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
              </svg>
              <div class="flex-grow">
                <label for="name-input" class="font-bold text-xs text-gray-500 uppercase tracking-wider block mb-1">
                  Nombre <span class="text-[#FF5722]">*</span>
                </label>
                <input
                  type="text"
                  id="name-input"
                  name="name-input"
                  autocomplete="off"
                  placeholder="Ej: John Doe"
                  class="w-full rounded-xl p-3 bg-gray-50 border border-gray-200 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-colors"
                />
                <p class="text-[10px] text-gray-400 font-medium mt-1">El nombre y apellido deben comenzar en mayúsculas.</p>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-start gap-3">
              <!-- Icono Carta (Correo) -->
              <svg class="w-6 h-6 text-black mt-2" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"></path>
              </svg>
              <div class="flex-grow">
                <label for="email-input" class="font-bold text-xs text-gray-500 uppercase tracking-wider block mb-1">
                  Correo <span class="text-[#FF5722]">*</span>
                </label>
                <input
                  type="email"
                  id="email-input"
                  name="email-input"
                  autocomplete="off"
                  placeholder="ejemplo@correo.com"
                  class="w-full rounded-xl p-3 bg-gray-50 border border-gray-200 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-colors"
                />
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-start gap-3">
              <!-- Icono Candado -->
              <svg class="w-6 h-6 text-black mt-2" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"></path>
              </svg>
              <div class="flex-grow">
                <label for="password-input" class="font-bold text-xs text-gray-500 uppercase tracking-wider block mb-1">
                  Contraseña <span class="text-[#FF5722]">*</span>
                </label>
                <input
                  type="password"
                  id="password-input"
                  name="password-input"
                  autocomplete="off"
                  class="w-full rounded-xl p-3 bg-gray-50 border border-gray-200 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-colors"
                />
                <p class="text-[10px] text-gray-400 font-medium leading-tight mt-1">
                  Al menos 8 caracteres, 1 letra y 1 número.
                </p>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-start gap-3">
              <!-- Icono Check -->
              <svg class="w-6 h-6 text-black mt-2" fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path>
              </svg>
              <div class="flex-grow">
                <label for="match-input" class="font-bold text-xs text-gray-500 uppercase tracking-wider block mb-1">
                  Confirmar contraseña <span class="text-[#FF5722]">*</span>
                </label>
                <input
                  type="password"
                  id="match-input"
                  name="match-input"
                  autocomplete="off"
                  class="w-full rounded-xl p-3 bg-gray-50 border border-gray-200 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-colors"
                />
              </div>
            </div>
          </div>
          
          <button 
            id="form-btn"
            disabled
            class="bg-[#FF5722] py-3 px-4 rounded-full font-black text-black shadow-lg hover:shadow-xl hover:scale-105 hover:bg-orange-600 text-center transition-all duration-300 disabled:opacity-40 disabled:cursor-not-allowed disabled:transform-none mt-2"
          >
            REGISTRARSE
          </button>

          <!-- Link -->
          <p class="text-center text-xs font-bold text-gray-800 mt-1">
            ¿Ya tienes una cuenta? <a href="/login" class="text-black hover:underline cursor-pointer">Inicia sesión</a>
          </p>
        </form>
      </div>
    </div>
    
    <script type="module" src="index.js"></script>
    <script type="module" src="/components/notification.js"></script>
</html>
